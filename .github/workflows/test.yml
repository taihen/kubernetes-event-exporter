name: Test
on: [push, pull_request]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:

    - name: Set up Go 1.26.1
      uses: actions/setup-go@v6
      with:
        go-version: "1.26.1"
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v6

    - name: Build
      run: go build -v .
    
    - name: Test
      run:  go test ./...
